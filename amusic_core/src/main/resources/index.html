<!DOCTYPE html>
<html>
<head>
<meta charset="us-ascii">
<link rel="icon" href="data:,">
<meta name="color-scheme" content="light dark">
<script src="./index.js"></script>
<style>
:root{
--font: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
--bg:#f8f8f8;
--card:#ffffff;
--border:#e6e6e6;
--text:#000000;
--text-muted:#6b6b6b;
--shadow: 0 1px 2px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.06);
--primary:#3b82f6;
--play:#22b55e;
--undo:#df4444;
--upload:#3ba2f6;
--rename:#f59e0b;
--buttontext:#0f0f0f;
--progressbarbg:#e5e7eb;
--transcodebar:#3b82f6;
--playbar:#22c55e;
--uploadbar:#f59e0b;
}
@media (prefers-color-scheme: dark){
:root{
--bg:#000000;
--card:#080808;
--border:#161616;
--text:#efefef;
--text-muted:#949494;
--play:#22753e;
--undo:#8f3434;
--upload:#3b6296;
--rename:#b57e0b;
--buttontext:#efefef;
--progressbarbg:#2a2f39;
--shadow:none;
}
}
body {
display:flex;flex-direction:column;align-items:center;
min-height:100vh;font-family:var(--font);
margin:0;padding:20px;background:var(--bg);color:var(--text);
}
#uploader{display:none;}
#file-list{
width:100%;max-width:700px;margin-top:30px;
background:var(--card);border-radius:12px;
box-shadow:var(--shadow);
overflow:hidden;
}
.file-item{
display:flex;flex-direction:column;padding:10px 15px;
border-bottom:1px solid var(--border);
}
.file-header{
display:flex;width:100%;align-items:center;justify-content:space-between;gap:10px;
}
.file-name{
font-weight:500;flex-grow:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.file-size{
font-size:0.8em;color:var(--text-muted);margin-left:8px;flex-shrink:0;
}
.controls{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-top:4px;}

.upload-label {--bg:var(--primary);background:var(--bg);--shadow:color-mix(in srgb, var(--bg), black 35%);box-shadow: 0 4px 0 var(--shadow);color:var(--buttontext);display:inline-block;padding:12px 24px;border-radius:6px;cursor:pointer;transition:background 0.2s;font-weight:bold;}
.upload-label.disabled{opacity: 0.5;cursor:default;box-shadow:none;transform:translateY(3px);}
.upload-label:not(.upload-label.disabled):hover{filter:brightness(1.1);}
.upload-label:not(.upload-label.disabled):active{transform:translateY(3px);box-shadow: 0 1px 0 var(--shadow)}
.btn{background:var(--bg);--shadow:color-mix(in srgb, var(--bg), black 35%);box-shadow: 0 4px 0 var(--shadow);color:var(--buttontext);padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;transition: all 0.1s ease;position:relative;}
.btn:disabled{opacity: 0.5;cursor:default;box-shadow:none;transform:translateY(3px);}
.btn:not(:disabled):hover{filter:brightness(1.1);}
.btn:not(:disabled):active{transform:translateY(3px);box-shadow: 0 1px 0 var(--shadow)}
.btn-play{--bg:var(--play);}
.btn-confirm{--bg:var(--upload);}
.btn-undo{--bg:var(--undo);}
.btn-rename{--bg:var(--rename);}

.status{font-size:0.85em;color:var(--text-muted)}
.byte-counter{font-size:0.8em;color:var(--text-muted);margin-left:6px;flex-shrink:0;}
#storage-info{
margin-top:10px;
font-size:0.9em;
color:var(--text-muted);
}

.progress-container{
width:100%;height:8px;background:var(--progressbarbg);border-radius:4px;margin-top:6px;overflow:hidden;
display:none;cursor:pointer;
}
.progress-bar{width:0%;height:100%;background:var(--primary);transition:width 0.1s linear;}
.progress-container.transcoding .progress-bar{background:var(--transcodebar);}
.progress-container.playing .progress-bar{background:var(--playbar);}
.progress-container.uploading .progress-bar{background:var(--uploadbar);}
</style>
</head>
<body>
<label for="uploader" class="upload-label disabled" id="upload-btn">Select Files</label>
<input type="file" accept="audio/*,video/*" id="uploader" disabled multiple>
<p id="message">Loading FFmpeg...</p>
<div id="storage-info"></div>
<div id="file-list"></div>
<script>
const token=window.parent.location.pathname.substring(1);
const files=new Map();
let currentAudio=null;
let playingFileId=null;
let currentProgressUpdate=null;
let controlledProgressId=null;
let limitsize=0;
const fileListContainer=document.getElementById('file-list');
const msg=document.getElementById('message');
const uploader=document.getElementById('uploader');
const uploadBtn=document.getElementById('upload-btn');
function uid(){
	return Math.random().toString(36).substr(2,9);
}
function byteLength(str){
	return new TextEncoder().encode(str).length;
}
function truncateName(str,maxBytes){
	let enc=new TextEncoder();
	let bytes=enc.encode(str);
	if(bytes.length<=maxBytes) return str;
	let truncated=str;
	while(byteLength(truncated)>maxBytes){
		truncated=truncated.slice(0,-1);
	} 
	return truncated;
}
function formatSize(bytes){
	bytes &= 0x7fffffff;
	if(bytes<1024) return bytes+' B';
	if(bytes<1048576) return (bytes/1024).toFixed(1)+' KiB';
	if(bytes<1073741824) return (bytes/1048576).toFixed(1)+' MiB';
	return (bytes/1073741824).toFixed(2)+' GiB';
}
function calculateFreeSize() {
	let totalsize = 0;
	for (const file of files.values()) {
		let size = file.size;
		if ((file.status === 'onserver' || file.status === 'uploaded' || file.status === 'uploading') && (file.added || size>-1)) {
			totalsize += size;
		}
	}
	return limitsize - totalsize;
}
function updateStorageInfo(){
	const free = calculateFreeSize();
	const used = limitsize - free;
	const el = document.getElementById('storage-info');
	if(!el) return;
	el.textContent = 'Used ' + formatSize(used) + ' / ' + formatSize(limitsize) + ' (' + formatSize(free) + ' free)';
}
function renderFile(file){
	let div=document.getElementById('item-'+file.id);
	if(!div){
		div=document.createElement('div');
		div.className='file-item';
		div.id='item-'+file.id;
		const header=document.createElement('div');
		header.className='file-header';
		const nameSpan=document.createElement('span');
		nameSpan.className='file-name';
		nameSpan.textContent=file.name;
		header.appendChild(nameSpan);
		const controls=document.createElement('div');
		controls.className='controls';
		controls.id='ctrl-'+file.id;
		header.appendChild(controls);
		div.appendChild(header);
		const progressCont=document.createElement('div');
		progressCont.className='progress-container';
		progressCont.id='pg-cont-'+file.id;
		progressCont.onclick=e=>seekAudio(e,file.id);
		const progressBar=document.createElement('div');
		progressBar.className='progress-bar';
		progressBar.id='pg-bar-'+file.id;
		progressCont.appendChild(progressBar);
		div.appendChild(progressCont);
		fileListContainer.appendChild(div);
	}
	updateUI(file);
}
function updateUI(file){
	const ctrl=document.getElementById('ctrl-'+file.id);
	if(!ctrl) return;
	ctrl.innerHTML='';
	
	const statusSpan=document.createElement('span');
	if(file.status==='pending'){
		statusSpan.className='status';
		statusSpan.textContent='Pending...';
		ctrl.appendChild(statusSpan);
		return;
	}
	if(file.status==='transcoding'){
		statusSpan.className='status';
		statusSpan.textContent='Transcoding...';
		ctrl.appendChild(statusSpan);
		return;
	}
	statusSpan.className='file-size';
	statusSpan.textContent=formatSize(file.size);
	const renameBtn = document.createElement('button');
	renameBtn.className='btn btn-rename';
	renameBtn.textContent='Rename';
	if(file.status==='converted') {
		renameBtn.onclick=()=>startRename(file.id);
	} else {
		renameBtn.disabled = true;
	}
	const playBtn=document.createElement('button');
	playBtn.className='btn btn-play';
	if(file.status==='converted' || file.status==='uploading' || file.status==='uploaded'){
		playBtn.onclick=()=>togglePlay(playBtn,file.id);
		if(currentAudio && playingFileId===file.id && !currentAudio.paused){
			playBtn.textContent='Pause';
		} else {
			playBtn.textContent='Play';
		}
	} else {
		playBtn.textContent='Play';
		playBtn.disabled = true;
	}
	const pushchangeBtn=document.createElement('button');
	if(file.status==='converted'){
		pushchangeBtn.className='btn btn-confirm';
		pushchangeBtn.textContent='Upload';
		const fits = calculateFreeSize() - file.size >= 0;
		pushchangeBtn.disabled = !fits;
		pushchangeBtn.onclick = ()=>confirmUpload(file.id);
	}else if(file.status==='uploading'){
		pushchangeBtn.className='btn btn-confirm';
		pushchangeBtn.textContent='Uploading...';
		pushchangeBtn.disabled = true;
	}else if(file.status==='uploaded'){
		pushchangeBtn.className='btn btn-undo';
		pushchangeBtn.textContent='Undo upload';
		pushchangeBtn.onclick=()=>undoUpload(file.id);
	}else if(file.status==='onserver') {
		if(file.added) {
			pushchangeBtn.className='btn btn-undo';
			pushchangeBtn.textContent='Undo upload';
			pushchangeBtn.onclick=()=>undoUpload(file.id);
		} else {
			if(file.size < 0) {
				pushchangeBtn.className='btn btn-undo';
				pushchangeBtn.textContent='Undo remove';
				const fits = calculateFreeSize() - (file.size & 0x7fffffff) >= 0;
				pushchangeBtn.disabled = !fits;
				pushchangeBtn.onclick = ()=>undoUpload(file.id);
			} else {
				pushchangeBtn.className='btn btn-confirm';
				pushchangeBtn.textContent='Remove';
				pushchangeBtn.onclick=()=>confirmUpload(file.id);
			}
		}
	}
	ctrl.appendChild(statusSpan);
	ctrl.appendChild(renameBtn);
	ctrl.appendChild(playBtn);
	ctrl.appendChild(pushchangeBtn);
}
function refreshAllUI(){
	for(const file of files.values()){
		updateUI(file);
	}
	updateStorageInfo();
}
function setProgress(id,percent,type){
	const cont=document.getElementById('pg-cont-'+id);
	const bar=document.getElementById('pg-bar-'+id);
	if(!cont||!bar) return;
	cont.style.display='block';
	cont.className='progress-container '+type;
	bar.style.width=percent+'%';
}
function seekAudio(e,id){
	if(playingFileId===id && currentAudio){
		const rect=e.currentTarget.getBoundingClientRect();
		const x=e.clientX-rect.left;
		currentAudio.currentTime=(x/rect.width)*currentAudio.duration;
	}
}
let transitioning = false;
async function togglePlay(btn,id){
	if(transitioning) return;
	const file=files.get(id);
	if(!file||!file.url) return;
	if(currentAudio && playingFileId===id){
		if(currentAudio.paused){
			transitioning = true;
			btn.textContent = 'Pause';
			currentAudio.play().then(() => {
			}).catch(err => {
				if (err.name !== 'AbortError') {
					console.error("Play failed", err);
					btn.textContent = 'Play';
				} else {
				}
			}).finally(() => {
				transitioning = false;
			});
		}else{
			btn.textContent='Play';
			currentAudio.pause();
		}
		return;
	}
	transitioning = true;
	if(currentAudio){
		currentAudio.onended = null;
		currentAudio.onloadedmetadata = null;
		currentAudio.pause();
		currentAudio.removeAttribute('src'); 
		currentAudio.load();
		document.querySelectorAll('.btn-play').forEach(b=>b.textContent='Play');
	}
	if (currentProgressUpdate) clearInterval(currentProgressUpdate);
	setProgress(id, 0, 'playing');
	currentProgressUpdate = null;
	function createProggressbarInterval(currentAudio) {
		const duration = currentAudio.duration;
		if (!currentProgressUpdate && isFinite(duration)) {
			currentProgressUpdate = setInterval(() => {
				setProgress(id, (currentAudio.currentTime / duration) * 100, 'playing');
			}, 100);
		}
	}
	currentAudio=new Audio(file.url);
	playingFileId=id;
	currentAudio.onloadedmetadata = () => {
		createProggressbarInterval(currentAudio);
	};
	currentAudio.onended = () => {
		btn.textContent = 'Play';
		playingFileId = null;
		if (currentProgressUpdate) clearInterval(currentProgressUpdate);
		setProgress(id, 0, 'playing');
	};
	btn.textContent = 'Pause';
	currentAudio.play().then(() => {
		createProggressbarInterval(currentAudio);
	}).catch(err => {
		if (err.name !== 'AbortError') {
			console.error("Play failed", err);
			btn.textContent = 'Play';
		} else {
			if (currentAudio && !currentAudio.paused) {
				createProggressbarInterval(currentAudio);
			}
		}
	}).finally(() => {
		transitioning = false;
	});
}
function startRename(id){
	const file=files.get(id);
	if(!file || !file.size) return;
	const div=document.getElementById('item-'+id);
	const nameSpan=div.querySelector('.file-name');
	const oldName=file.name;
	const input=document.createElement('input');
	input.type='text';
	input.value=file.name;
	input.maxLength=255;
	const counter=document.createElement('span');
	counter.className='byte-counter';
	counter.textContent='['+byteLength(input.value)+' bytes]';
	input.oninput=()=>{
		counter.textContent='['+byteLength(input.value)+' bytes]';
	};
	nameSpan.textContent='';
	nameSpan.appendChild(input);
	nameSpan.appendChild(counter);
	input.focus();
	input.select();
	const finish=(confirm)=>{
		if(confirm){
			file.name=truncateName(input.value,255);
		} 
		nameSpan.textContent=file.name;
		input.remove();
		counter.remove();
	};
	input.onblur=()=>finish(true);
	input.onkeydown=e=>{
		if(e.key==='Enter') finish(true);
		if(e.key==='Escape') finish(false);
	};
}
let ffmpeg=null;
async function initFFmpeg(){
	if(ffmpeg) return;
	ffmpeg=new FFmpegWASM.FFmpeg({log:false});
	ffmpeg.on('progress',p=>{
		if(controlledProgressId)setProgress(controlledProgressId,Math.round(p.progress*100),'transcoding');
		msg.textContent='Transcoding: '+Math.round(p.progress*100)+'%';
	});
	await ffmpeg.load({coreURL:'./ffmpeg-core.js'});
}
async function transcodeFiles(filesToTranscode){
	for(const file of filesToTranscode){
		file.status='transcoding';
		updateUI(file);
		setProgress(file.id,0,'transcoding');
		controlledProgressId=file.id;
		const inName='input_'+file.id; const outName='output_'+file.id+'.ogg';
		await ffmpeg.writeFile(inName,await FFmpegUtil.fetchFile(file.file));
		await ffmpeg.exec(['-i',inName,'-strict','-2','-acodec','vorbis','-ab','64000','-ac','2','-ar','44100','-f','ogg','-vn','-y',outName]);
		const data=await ffmpeg.readFile(outName);
		file.blob=new Blob([data.buffer],{type:'audio/ogg'});
		file.url=URL.createObjectURL(file.blob);
		file.size = file.blob.size;
		file.status='converted';
		updateUI(file);
		setProgress(file.id, 0, 'playing');
		await ffmpeg.deleteFile(inName);
		await ffmpeg.deleteFile(outName);
		controlledProgressId=null;
	}
	msg.textContent='Done';
}
uploader.addEventListener('change',async e=>{
	uploader.disabled=true; uploadBtn.classList.add('disabled');
	const filesToTranscode=[];
	for(const f of e.target.files){
		const id=uid();
		const name=truncateName(f.name.replace(/\.[^.]+$/,''),255);
		const fileObj={id:id,name:name,size:0,added:true,status:'pending',file:f,blob:null,url:null};
		files.set(id,fileObj);
		filesToTranscode.push(fileObj);
		renderFile(fileObj);
	}
	await transcodeFiles(filesToTranscode);
	uploader.disabled=false; uploadBtn.classList.remove('disabled');
});
async function confirmUpload(id){
	const file=files.get(id);
	if(!file) return;
	if(file.added) {
		if(!file.blob) return;
		const data=await file.blob.arrayBuffer();
		file.status='uploading';
		if(calculateFreeSize()<0){
			file.status='converted';
			refreshAllUI();
			return;
		}
		refreshAllUI();
		setProgress(id,0,'uploading');
		const encoder=new TextEncoder();
		const binName=Array.from(encoder.encode(file.name)).map(c=>String.fromCharCode(c)).join('');
		const url='./'+btoa(binName);
		const xhr=new XMLHttpRequest();
		xhr.open('PUT',url,true);
		xhr.setRequestHeader('AUTH',token);
		xhr.upload.onprogress=e=>setProgress(id,Math.round(e.loaded/e.total*100),'uploading');
		xhr.onload=()=>{
			setProgress(id,0,'uploading');
			if(xhr.status===204) {
				file.status='uploaded'; updateUI(file);
			} else {
				file.status='converted'; refreshAllUI();
			}
		};
		xhr.onerror=()=>{
			setProgress(id,0,'uploading');
			file.status='converted'; refreshAllUI();
		};
		xhr.send(data);
	} else {
		const data=new ArrayBuffer(0);;
		const encoder=new TextEncoder();
		const binName=Array.from(encoder.encode(file.name)).map(c=>String.fromCharCode(c)).join('');
		const url='./'+btoa(binName);
		const xhr=new XMLHttpRequest();
		xhr.open('PUT',url,true);
		xhr.setRequestHeader('AUTH',token);
		xhr.onload=()=>{
			if(xhr.status===204){
				file.status='onserver'; file.size|=0x80000000; refreshAllUI();
			} else {
				file.status='onserver'; updateUI(file);
			}
		};
		xhr.onerror=()=>{
			file.status='onserver'; updateUI(file);
		};
		xhr.send(data);
	}
}
async function undoUpload(id){
	const file=files.get(id);
	if(!file) return;
	if(!file.added&&calculateFreeSize()-(file.size&0x7fffffff)<0){
		return;
	}
	const encoder=new TextEncoder();
	const binName=Array.from(encoder.encode(file.name)).map(c=>String.fromCharCode(c)).join('');
	const url='./'+btoa(binName);
	const xhr=new XMLHttpRequest();
	xhr.open('DELETE',url,true);
	xhr.setRequestHeader('AUTH',token);
	if(file.added) {
		xhr.onload=()=>{
			if(xhr.status===204){
				if(playingFileId===id){
					transitioning = true;
					if(currentAudio) {
						currentAudio.onended = null;
						currentAudio.onloadedmetadata = null;
						currentAudio.pause();
						currentAudio.removeAttribute('src'); 
						currentAudio.load();
						currentAudio = null;
					}
					if (currentProgressUpdate) {
						clearInterval(currentProgressUpdate);
						currentProgressUpdate = null;
					}
					playingFileId = null;
					transitioning = false;
				}
				if(file.url) URL.revokeObjectURL(file.url);
				if(file.blob) file.blob = null;
				files.delete(id);
				const div=document.getElementById('item-'+id);
				if(div) div.remove();
				refreshAllUI();
			}
		};
	} else {
		file.size&=0x7fffffff;
		refreshAllUI();
		xhr.onload=()=>{
			if(xhr.status===204){
				file.status='onserver';
			} else {
				file.size|=0x80000000;
				file.status='onserver';
				refreshAllUI();
			}
		};
		xhr.onerror=()=>{
			file.size|=0x80000000;
			file.status='onserver';
			refreshAllUI();
		};
	}
	
	xhr.send();
}
async function loadUploadedFiles(){
	try{
		const resp = await fetch('./', { method:'GET', headers:{ 'AUTH': token } });
		if(resp.status !== 200) return;
		const buf = new Uint8Array(await resp.arrayBuffer());
		const decoder = new TextDecoder();
		let off = 0;
		const files_=new Map();
		function readBlock(added){
			const count = (buf[off]<<8) | buf[off+1];
			off += 2;
			const nameLens = buf.subarray(off, off + count);
			off += count;
			const sizes = [];
			for(let i=0;i<count;i++){
				sizes.push((buf[off]<<24)|(buf[off+1]<<16)|(buf[off+2]<<8)|buf[off+3]);
				off += 4;
			}
			for(let i=0;i<count;i++){
				const name = decoder.decode(buf.subarray(off, off + nameLens[i]));
				off += nameLens[i];
				const pfile = files_.get(name);
				if(pfile) {
					pfile.size |= 0x80000000; 
				} else {
					const id = uid();
					const fileObj = {id:id,name:name,size:sizes[i],added:added,status:'onserver',blob:null,url:null};
					files_.set(name, fileObj);
				}
			}
		}

		limitsize = (buf[off]<<24) | (buf[off+1]<<16) | (buf[off+2]<<8) | buf[off+3];
		off+=4;
		readBlock(false);
		readBlock(true);
		for (const value of files_.values()) {
			files.set(value.id, value);
			renderFile(value);
		}
		refreshAllUI();
	} catch(e){
		console.log('Failed to load uploaded files', e);
	}
}
(async()=>{
	await initFFmpeg();
	await loadUploadedFiles();
	uploader.disabled=false;
	uploadBtn.classList.remove('disabled');
	msg.textContent='Ready';
})();
</script>
</body>
